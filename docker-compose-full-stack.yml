version: '3.8'

services:
  # ===== INFRASTRUCTURE SERVICES =====

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: neuroshield-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_postgres_pass_123
      POSTGRES_DB: neuroshield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neuroshield-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d neuroshield_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: neuroshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - neuroshield-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Jenkins CI/CD
  jenkins:
    image: jenkins/jenkins:lts-alpine
    container_name: neuroshield-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_OPTS: "--httpPort=8080"
      JENKINS_HOME: /var/jenkins_home
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - neuroshield-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: neuroshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - neuroshield-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: neuroshield-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - neuroshield-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: neuroshield-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - neuroshield-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== NEUROSHIELD ORCHESTRATOR =====

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroshield-orchestrator
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: production
      JENKINS_URL: http://jenkins:8080
      PROMETHEUS_URL: http://prometheus:9090
      DUMMY_APP_URL: http://kubernetes-api:5000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://admin:secure_postgres_pass_123@postgres:5432/neuroshield_db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube/config:/root/.kube/config:ro
    networks:
      - neuroshield-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      jenkins:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== OPTIONAL: Node Exporter for Host Metrics =====

  node_exporter:
    image: prom/node-exporter:latest
    container_name: neuroshield-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - neuroshield-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  neuroshield-net:
    driver: bridge
    name: neuroshield-net

volumes:
  postgres_data:
    name: neuroshield_postgres_data
  redis_data:
    name: neuroshield_redis_data
  jenkins_home:
    name: neuroshield_jenkins_home
  prometheus_data:
    name: neuroshield_prometheus_data
  grafana_data:
    name: neuroshield_grafana_data
  alertmanager_data:
    name: neuroshield_alertmanager_data
