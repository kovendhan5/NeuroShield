<!-- Judge Dashboard Component
Detailed view of decision-making process for capstone presentation
Shows: Timeline | Metrics | ML Pipeline | Failure Injection Guide
-->

<template id="judge-dashboard">
  <div class="judge-dashboard">
    <!-- Header -->
    <div class="judge-header">
      <div class="judge-title">
        <span class="badge badge-live">● LIVE</span>
        <h1>⚡ NeuroShield Judge Dashboard</h1>
        <p>Real-time AI decision-making transparency</p>
      </div>
    </div>

    <!-- Live Decision Timeline -->
    <div class="judge-section">
      <h2 class="section-title">Current Healing Session</h2>
      <div class="timeline-container">
        <div v-if="liveDecision" class="timeline">
          <!-- Timeline Stage -->
          <div v-for="(stage, idx) in liveDecision.stages" :key="idx" class="timeline-stage" :class="stage.status">
            <div class="timeline-marker" :class="stage.status">
              <span class="stage-icon">{{ stage.icon }}</span>
            </div>
            <div class="timeline-content">
              <h3>{{ stage.name }}</h3>
              <p class="stage-description">{{ stage.timestamp }}</p>

              <!-- Stage Details -->
              <div v-if="stage.metrics" class="stage-metrics">
                <span v-for="(val, key) in stage.metrics" :key="key" class="metric-badge">
                  {{ key }}: {{ typeof val === 'number' ? val.toFixed(1) : val }}
                </span>
              </div>

              <div v-if="stage.reasoning" class="stage-reasoning">
                <strong>Decision Reasoning:</strong>
                <ul>
                  <li v-for="(reason, idx) in Object.values(stage.reasoning)" :key="idx">
                    {{ reason }}
                  </li>
                </ul>
              </div>

              <div v-if="stage.confidence" class="confidence">
                Confidence:
                <span class="confidence-bar">
                  <span class="confidence-fill" :style="{ width: (stage.confidence * 100) + '%' }"></span>
                </span>
                {{ (stage.confidence * 100).toFixed(1) }}%
              </div>

              <div v-if="stage.command" class="command-block">
                <code>{{ stage.command }}</code>
              </div>

              <div class="stage-time">
                {{ stage.duration_ms }}ms
              </div>
            </div>
          </div>
        </div>

        <!-- Metrics Summary -->
        <div class="metrics-summary">
          <div class="metric-card">
            <span class="metric-label">Detection Latency</span>
            <span class="metric-value">{{ liveDecision?.metrics.detection_latency_ms }}ms</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">End-to-End</span>
            <span class="metric-value">{{ liveDecision?.metrics.decision_latency_ms }}ms</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Est. MTTR</span>
            <span class="metric-value">{{ liveDecision?.metrics.estimated_mttr_s }}s</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Confidence</span>
            <span class="metric-value">{{ (liveDecision?.metrics.confidence * 100).toFixed(0) }}%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Statistics -->
    <div class="judge-section">
      <h2 class="section-title">Healing Statistics</h2>
      <div class="stats-grid">
        <div class="stat-card success">
          <div class="stat-value">{{ actionStats?.success_rate ? (actionStats.success_rate * 100).toFixed(1) : 0 }}%</div>
          <div class="stat-label">Success Rate</div>
          <div class="stat-detail">{{ actionStats?.total_success }}/{{ actionStats?.total_heals }} heals</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">{{ actionStats?.avg_mttr_s?.toFixed(1) }}s</div>
          <div class="stat-label">Avg MTTR</div>
          <div class="stat-detail">vs {{ actionStats?.baseline_mttr_s }}s baseline</div>
        </div>
        <div class="stat-card highlight">
          <div class="stat-value">{{ actionStats?.mttr_reduction_pct?.toFixed(1) }}%</div>
          <div class="stat-label">MTTR Reduction</div>
          <div class="stat-detail">Faster than baseline</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">{{ actionStats?.avg_confidence?.toFixed(2) }}</div>
          <div class="stat-label">Avg Confidence</div>
          <div class="stat-detail">Out of 1.0</div>
        </div>
      </div>

      <!-- Action Breakdown -->
      <div class="action-breakdown">
        <h3>Performance by Action Type</h3>
        <div class="action-table">
          <table>
            <thead>
              <tr>
                <th>Action</th>
                <th>Count</th>
                <th>Success Rate</th>
                <th>Avg MTTR</th>
                <th>vs Baseline</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(stats, action) in actionStats?.by_action" :key="action">
                <td class="action-name">{{ formatActionName(action) }}</td>
                <td>{{ stats.count }}</td>
                <td>
                  <span class="success-badge" :class="{ high: stats.success_rate > 0.9 }">
                    {{ (stats.success_rate * 100).toFixed(0) }}%
                  </span>
                </td>
                <td>{{ stats.avg_mttr_s.toFixed(1) }}s</td>
                <td class="reduction">
                  {{ ((1 - stats.avg_mttr_s / stats.baseline_s) * 100).toFixed(0) }}% faster
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ML Pipeline Architecture -->
    <div class="judge-section">
      <h2 class="section-title">ML Pipeline Architecture</h2>
      <div class="pipeline">
        <div v-for="(stage, idx) in modelArch?.pipeline" :key="idx" class="pipeline-stage">
          <div class="stage-box">
            <h4>{{ stage.stage }}</h4>
            <p class="stage-input">Input: {{ stage.input }}</p>
            <div class="components">
              <span v-for="comp in stage.components" :key="comp" class="component">{{ comp }}</span>
            </div>
            <p v-if="stage.output" class="stage-output">Output: {{ stage.output }}</p>
          </div>
          <div v-if="idx < modelArch.pipeline.length - 1" class="pipeline-arrow">→</div>
        </div>
      </div>

      <!-- Performance Metrics -->
      <div class="pipeline-metrics">
        <div v-for="(val, key) in modelArch?.performance" :key="key" class="perf-metric">
          <span class="perf-label">{{ key }}</span>
          <span class="perf-value">{{ typeof val === 'number' && val < 1 ? val.toFixed(3) : val }}</span>
        </div>
      </div>
    </div>

    <!-- Failure Injection Guide for Judges -->
    <div class="judge-section">
      <h2 class="section-title">Live Demo: Failure Injection</h2>
      <p class="section-description">
        Judges can trigger test scenarios to watch NeuroShield detect and heal failures in real-time
      </p>
      <div class="failure-scenarios">
        <div v-for="scenario in failureGuide?.scenarios" :key="scenario.id" class="scenario-card">
          <div class="scenario-header">
            <h3>{{ scenario.name }}</h3>
            <span class="scenario-id">#{{ scenario.id }}</span>
          </div>
          <p class="scenario-description">{{ scenario.description }}</p>
          <div class="scenario-command">
            <code>{{ scenario.command }}</code>
            <button @click="copyCommand(scenario.command)" class="copy-btn" title="Copy command">📋</button>
          </div>
          <div class="scenario-expected">
            <div class="expected-action">
              <strong>Expected Action:</strong> {{ formatActionName(scenario.expected_action) }}
            </div>
            <div class="expected-mttr">
              <strong>Expected Time:</strong> {{ scenario.expected_mttr_s }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Decision History -->
    <div class="judge-section">
      <h2 class="section-title">Recent Decisions</h2>
      <div class="history-table">
        <table>
          <thead>
            <tr>
              <th>Time</th
              <th>Action</th>
              <th>Confidence</th>
              <th>Result</th>
              <th>MTTR</th>
              <th>Reason</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="decision in decisionHistory" :key="decision.id">
              <td class="time">{{ formatTime(decision.timestamp) }}</td>
              <td class="action">{{ formatActionName(decision.action) }}</td>
              <td class="confidence">{{ (decision.confidence * 100).toFixed(0) }}%</td>
              <td class="result" :class="decision.result">{{ decision.result }}</td>
              <td class="mttr">{{ decision.mttr_s.toFixed(1) }}s</td>
              <td class="reason">{{ decision.reason }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</template>
