apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuroshield-pro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neuroshield-pro
  template:
    metadata:
      labels:
        app: neuroshield-pro
    spec:
      containers:
        - name: neuroshield-pro
          image: neuroshield-pro:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8888
          env:
            - name: JENKINS_URL
              value: "http://jenkins:8080"
            - name: PIPELINE_WATCH_URL
              value: "http://localhost:5000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8888
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: neuroshield-pro
spec:
  selector:
    app: neuroshield-pro
  ports:
    - port: 8888
      targetPort: 8888
  type: ClusterIP
