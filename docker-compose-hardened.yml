version: '3.8'

services:
  # ===== INFRASTRUCTURE LAYER =====

  postgres:
    image: postgres:15-alpine
    container_name: neuroshield-postgres
    environment:
      POSTGRES_USER: postgres  # Admin only for initialization
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: neuroshield_db
    ports:
      - "127.0.0.1:5432:5432"  # Localhost only!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - neuroshield-prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neuroshield_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: neuroshield-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"  # Localhost only!
    volumes:
      - redis_data:/data
    networks:
      - neuroshield-prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ===== MONITORING STACK =====

  prometheus:
    image: prom/prometheus:latest
    container_name: neuroshield-prometheus
    user: "65534"  # Nobody user for security
    ports:
      - "127.0.0.1:9090:9090"  # Localhost only!
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'  # 15 days for ML learning
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'  # DISABLE IN PRODUCTION
    networks:
      - neuroshield-prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  grafana:
    image: grafana/grafana:latest
    container_name: neuroshield-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_HTTPONLY: "true"
      GF_SECURITY_COOKIE_SAMESITE: "Lax"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_PROXY_ENABLED: "false"
    ports:
      - "127.0.0.1:3000:3000"  # Use reverse proxy in front!
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - neuroshield-prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: neuroshield-alertmanager
    user: "65534"
    ports:
      - "127.0.0.1:9093:9093"  # Localhost only!
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://alertmanager:9093'
    networks:
      - neuroshield-prod
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.125'
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: neuroshield-node-exporter
    ports:
      - "127.0.0.1:9100:9100"  # Localhost only!
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - neuroshield-prod
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.125'
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ===== CI/CD =====

  jenkins:
    image: jenkins/jenkins:lts-alpine
    container_name: neuroshield-jenkins
    user: root
    ports:
      - "127.0.0.1:8080:8080"  # Use reverse proxy!
      - "50000:50000"
    environment:
      JENKINS_OPTS: "--httpPort=8080 --prefix=/jenkins --argumentsRealm.passwd.admin=${JENKINS_PASSWORD}"
      JAVA_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - neuroshield-prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ===== MICROSERVICE APPLICATION =====

  microservice:
    build:
      context: .
      dockerfile: apps/Dockerfile.microservice
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: neuroshield-microservice:${VERSION:-latest}
    container_name: neuroshield-microservice
    user: "1000"  # Non-root user
    ports:
      - "127.0.0.1:5000:5000"  # Localhost only!
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://neuroshield_app:${DB_USER_PASSWORD}@postgres:5432/neuroshield_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      API_SECRET_KEY: ${API_SECRET_KEY}
      ENVIRONMENT: production
      LOG_LEVEL: info
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - neuroshield-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Authorization: Bearer ${API_SECRET_KEY}", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ===== ORCHESTRATOR (AI HEALING) =====

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: neuroshield-orchestrator:${VERSION:-latest}
    container_name: neuroshield-orchestrator
    user: "1000"  # Non-root user
    ports:
      - "127.0.0.1:8000:8000"  # Localhost only!
    environment:
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: production
      LOG_LEVEL: info
      JENKINS_URL: http://jenkins:8080
      PROMETHEUS_URL: http://prometheus:9090
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      DATABASE_URL: postgresql://neuroshield_app:${DB_USER_PASSWORD}@postgres:5432/neuroshield_db
      API_SECRET_KEY: ${API_SECRET_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - neuroshield-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      microservice:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  neuroshield-prod:
    driver: bridge
    name: neuroshield-prod
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  postgres_data:
    name: neuroshield-postgres-data
  redis_data:
    name: neuroshield-redis-data
  jenkins_data:
    name: neuroshield-jenkins-data
  prometheus_data:
    name: neuroshield-prometheus-data
  grafana_data:
    name: neuroshield-grafana-data
  alertmanager_data:
    name: neuroshield-alertmanager-data
