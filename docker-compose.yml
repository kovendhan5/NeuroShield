version: '3.8'

services:
  # NeuroShield v3 - Orchestrator + API + Dashboard (Local)
  neuroshield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroshield-orchestrator
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: local
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - neuroshield-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  neuroshield-net:
    driver: bridge

volumes:
  jenkins_home:
