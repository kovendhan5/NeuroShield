version: '3.8'

services:
  # ===== INFRASTRUCTURE LAYER =====

  postgres:
    image: postgres:15-alpine
    container_name: neuroshield-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: neuroshield_secure_123
      POSTGRES_DB: neuroshield_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neuroshield-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neuroshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - neuroshield-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MONITORING STACK =====

  prometheus:
    image: prom/prometheus:latest
    container_name: neuroshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - neuroshield-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: neuroshield-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_SECURITY_ADMIN_USER: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana:/etc/grafana/provisioning:ro
    networks:
      - neuroshield-net
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:latest
    container_name: neuroshield-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - neuroshield-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: neuroshield-node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - neuroshield-net
    restart: unless-stopped

  # ===== CI/CD LAYER =====

  jenkins:
    image: jenkins/jenkins:lts-alpine
    container_name: neuroshield-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_OPTS: "--httpPort=8080 --argumentsRealm.passwd.admin=neuroshield_pass_123"
      JENKINS_HOME: /var/jenkins_home
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - neuroshield-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== REAL PRODUCTION APPLICATION =====

  backend-app:
    build:
      context: .
      dockerfile: apps/Dockerfile
    container_name: neuroshield-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PROMETHEUS_PUSHGATEWAY: http://prometheus:9090
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://admin:neuroshield_secure_123@postgres:5432/neuroshield_db
      LOG_LEVEL: info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - neuroshield-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== NEUROSHIELD ORCHESTRATOR (AI HEALING ENGINE) =====

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuroshield-orchestrator
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      ENVIRONMENT: production
      LOG_LEVEL: info
      JENKINS_URL: http://jenkins:8080
      JENKINS_USER: admin
      JENKINS_PASSWORD: neuroshield_pass_123
      PROMETHEUS_URL: http://prometheus:9090
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://admin:neuroshield_secure_123@postgres:5432/neuroshield_db
      BACKEND_APP_URL: http://backend-app:5000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - neuroshield-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      jenkins:
        condition: service_started
      backend-app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===== STREAMLIT DASHBOARD =====

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: neuroshield-dashboard
    ports:
      - "8501:8501"
    environment:
      PYTHONUNBUFFERED: 1
      ORCHESTRATOR_URL: http://orchestrator:8000
      PROMETHEUS_URL: http://prometheus:9090
      JENKINS_URL: http://jenkins:8080
      BACKEND_APP_URL: http://backend-app:5000
      DATABASE_URL: postgresql://admin:neuroshield_secure_123@postgres:5432/neuroshield_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - neuroshield-net
    depends_on:
      - orchestrator
      - backend-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  neuroshield-net:
    driver: bridge
    name: neuroshield-net

volumes:
  postgres_data:
  redis_data:
  jenkins_home:
  prometheus_data:
  grafana_data:
  alertmanager_data:
