---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neuroshield-ingress
  namespace: neuroshield-prod
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: neuroshield.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 5000
      - path: /prometheus/
        pathType: Prefix
        backend:
          service:
            name: prometheus-service
            port:
              number: 9090
      - path: /grafana/
        pathType: Prefix
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
      - path: /alertmanager/
        pathType: Prefix
        backend:
          service:
            name: alertmanager-service
            port:
              number: 9093
