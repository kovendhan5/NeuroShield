---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: neuroshield-prod
  labels:
    app: api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: api
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install flask prometheus-client psycopg2-binary redis --quiet
            python3 << 'PYEOF'
            import os
            import json
            import time
            from flask import Flask, jsonify
            from prometheus_client import Counter, Histogram, generate_latest
            import psycopg2
            import redis
            
            app = Flask(__name__)
            
            # Metrics
            request_count = Counter('api_requests_total', 'Total API requests', ['method', 'endpoint'])
            request_duration = Histogram('api_request_duration_seconds', 'API request duration')
            
            # Database connection
            try:
                conn = psycopg2.connect(
                    host=os.getenv('DATABASE_HOST', 'postgres-service'),
                    user=os.getenv('DATABASE_USER', 'admin'),
                    password=os.getenv('DATABASE_PASSWORD', 'secure_postgres_pass_123'),
                    database=os.getenv('DATABASE_NAME', 'neuroshield_db')
                )
                db_connected = True
            except:
                db_connected = False
            
            # Redis connection
            try:
                r = redis.Redis(host=os.getenv('REDIS_HOST', 'redis-service'), port=6379)
                r.ping()
                redis_connected = True
            except:
                redis_connected = False
            
            @app.route('/health', methods=['GET'])
            def health():
                request_count.labels(method='GET', endpoint='/health').inc()
                return jsonify({
                    'status': 'healthy',
                    'database': 'connected' if db_connected else 'disconnected',
                    'redis': 'connected' if redis_connected else 'disconnected',
                    'timestamp': time.time()
                }), 200
            
            @app.route('/api/v1/status', methods=['GET'])
            @request_duration.time()
            def status():
                request_count.labels(method='GET', endpoint='/api/v1/status').inc()
                return jsonify({
                    'service': 'api',
                    'version': '1.0.0',
                    'hostname': os.getenv('HOSTNAME', 'api-service'),
                    'replicas': 3,
                    'database': 'PostgreSQL',
                    'cache': 'Redis'
                }), 200
            
            @app.route('/api/v1/data', methods=['GET'])
            @request_duration.time()
            def get_data():
                request_count.labels(method='GET', endpoint='/api/v1/data').inc()
                data = {'items': ['item1', 'item2', 'item3'], 'count': 3}
                if redis_connected:
                    r.setex('api_data', 300, json.dumps(data))
                return jsonify(data), 200
            
            @app.route('/metrics', methods=['GET'])
            def metrics():
                return generate_latest(), 200
            
            @app.errorhandler(500)
            def server_error(e):
                request_count.labels(method='ERROR', endpoint='unknown').inc()
                return jsonify({'error': 'Internal server error'}), 500
            
            if __name__ == '__main__':
                app.run(host='0.0.0.0', port=5000, debug=False)
            PYEOF
        ports:
        - name: http
          containerPort: 5000
        - name: metrics
          containerPort: 9090
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: neuroshield-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: neuroshield-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: neuroshield-config
              key: DATABASE_NAME
        - name: DATABASE_USER
          value: "admin"
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: neuroshield-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: neuroshield-config
              key: REDIS_PORT
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: neuroshield-prod
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
  - name: http
    port: 5000
    targetPort: 5000
  - name: metrics
    port: 9090
    targetPort: 9090

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: neuroshield-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api
