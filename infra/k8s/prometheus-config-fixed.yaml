apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: neuroshield-prod
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager-service:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'api-service'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - neuroshield-prod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: api
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      - job_name: 'worker-service'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - neuroshield-prod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: worker
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

  alerts.yml: |
    groups:
      - name: neuroshield-alerts
        interval: 30s
        rules:
          - alert: PodDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
          - alert: HighMemory
            expr: container_memory_usage_bytes > 500000000
            for: 2m
            labels:
              severity: warning
