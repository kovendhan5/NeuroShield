global:
  resolve_timeout: 5m
  slack_api_url: ''  # Add your Slack webhook if desired

route:
  group_by: [alertname, cluster, service]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    # Add notification integrations here (email, webhook, etc.)

  - name: 'critical'
    # Critical alerts - immediate notification
    # Example: Slack, PagerDuty, etc.

  - name: 'warning'
    # Warning alerts - can be batched

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: [alertname, dev, instance]
