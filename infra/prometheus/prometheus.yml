global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jenkins'
    metrics_path: /prometheus/
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:8080']
    scrape_interval: 15s

  - job_name: 'incident-board'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5000']
    scrape_interval: 15s

  - job_name: 'neuroshield-api'
    metrics_path: /prometheus_metrics
    static_configs:
      - targets: ['host.docker.internal:8502']
    scrape_interval: 15s
