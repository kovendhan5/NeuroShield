global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'neuroshield-prod'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['neuroshield-alertmanager:9093']

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (System Metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['neuroshield-node-exporter:9100']
    scrape_interval: 10s

  # NeuroShield API
  - job_name: 'neuroshield-api'
    metrics_path: /prometheus_metrics
    scheme: http
    static_configs:
      - targets: ['neuroshield-api:8000']
    scrape_interval: 10s

  # NeuroShield Worker
  - job_name: 'neuroshield-worker'
    metrics_path: /prometheus_metrics
    scheme: http
    static_configs:
      - targets: ['neuroshield-worker:8000']
    scrape_interval: 10s

  # Jenkins (if available)
  - job_name: 'jenkins'
    metrics_path: /prometheus/
    scheme: http
    static_configs:
      - targets: ['neuroshield-jenkins:8080']
    scrape_interval: 30s
    scrape_timeout: 10s

  # PostgreSQL (via postgres-exporter if running)
  - job_name: 'postgres'
    static_configs:
      - targets: ['neuroshield-postgres:5432']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

  # Redis (via redis-exporter if running)
  - job_name: 'redis'
    static_configs:
      - targets: ['neuroshield-redis:6379']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http
