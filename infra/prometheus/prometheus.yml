global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'neuroshield-prod'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['neuroshield-alertmanager:9093']

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NeuroShield API (with built-in metrics)
  - job_name: 'neuroshield-api'
    metrics_path: /prometheus_metrics
    scheme: http
    static_configs:
      - targets: ['neuroshield-api:8000']
    scrape_interval: 10s

  # NeuroShield Worker (with built-in metrics)
  - job_name: 'neuroshield-worker'
    metrics_path: /prometheus_metrics
    scheme: http
    static_configs:
      - targets: ['neuroshield-worker:8000']
    scrape_interval: 10s

  # Optional: PostgreSQL Exporter (if postgres-exporter container is running)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['neuroshield-postgres-exporter:9187']
    scrape_interval: 15s
    relabel_configs:
      - action: replace
        target_label: instance
        replacement: neuroshield-postgres

  # Optional: Redis Exporter (if redis-exporter service is running)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['neuroshield-redis-exporter:9121']
    scrape_interval: 15s
    relabel_configs:
      - action: replace
        target_label: instance
        replacement: neuroshield-redis
