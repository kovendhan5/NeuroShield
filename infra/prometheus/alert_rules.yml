groups:
  - name: neuroshield_alerts
    interval: 10s
    rules:
      # API Health
      - alert: APIDown
        expr: up{job="neuroshield-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NeuroShield API is down"
          description: "API at {{ $labels.instance }} is not responding"

      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "p95 latency: {{ $value }}s"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate: {{ $value }}/sec"

      # Memory Alerts
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory: {{ $value | humanizePercentage }}"

      # CPU Alerts
      - alert: HighCPUUsage
        expr: rate(node_cpu_seconds_total{mode="idle"}[5m]) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU idle time: {{ $value | humanizePercentage }}"

      # Prediction Alerts
      - alert: HighFailureProbability
        expr: neuroshield_prediction_probability > 0.8
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High failure probability predicted"
          description: "Failure probability: {{ $value | humanizePercentage }}"

      # Healing Alerts
      - alert: HealingActionFailed
        expr: neuroshield_healing_action_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Healing action failed"
          description: "Action: {{ $labels.action }}"

      - alert: LowHealingSuccessRate
        expr: neuroshield_healing_success_rate < 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low healing success rate"
          description: "Success rate: {{ $value | humanizePercentage }}"

      # Database Alerts
      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of database connections"
          description: "Connections: {{ $value }}"

      # Worker Alerts
      - alert: WorkerDown
        expr: up{job="neuroshield-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "NeuroShield Worker is down"
          description: "Worker at {{ $labels.instance }} is not responding"

      - alert: PredictionQueueBacklog
        expr: neuroshield_prediction_queue_length > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prediction queue backlog detected"
          description: "Queue length: {{ $value }}"
